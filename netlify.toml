[build]
  publish = "."

# HTML — always revalidate so visitors see new deploys immediately
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# content.json — short cache so text edits show up quickly without forcing
# a full network fetch on every single page load (the old "no-store" did)
[[headers]]
  for = "/content.json"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

# CSS / JS — cache for a day; bump the filename or query string if you
# need to force an instant refresh for returning visitors
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# Images, video, fonts, icons — cache hard, these rarely change
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=604800, immutable"

[[headers]]
  for = "/*.ico"
  [headers.values]
    Cache-Control = "public, max-age=604800, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=604800, immutable"
