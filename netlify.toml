[build]
  publish = "."

# HTML — always revalidate so visitors see new deploys immediately
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"

# content.json — 5-minute cache (edits visible quickly, not re-fetched every load)
[[headers]]
  for = "/content.json"
  [headers.values]
    Cache-Control = "public, max-age=300, stale-while-revalidate=60"

# CSS / JS — 1-year immutable cache (hash or rename to bust)
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Images & video — 1-year immutable
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Favicons — 1 week
[[headers]]
  for = "/*.ico"
  [headers.values]
    Cache-Control = "public, max-age=604800, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=604800, immutable"
